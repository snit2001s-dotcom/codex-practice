<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ゆいなのサイト</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
        color: #4a4a4a;
        background: linear-gradient(135deg, #fffaf5 0%, #fef6ff 45%, #f2fbff 100%);
      }

      .card {
        width: min(100%, 680px);
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid #f2e8f8;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(151, 131, 172, 0.12);
        padding: clamp(20px, 5vw, 36px);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.8rem, 6vw, 2.4rem);
        color: #5b4b8a;
      }

      p {
        margin: 0;
        line-height: 1.8;
        font-size: clamp(1rem, 3.8vw, 1.1rem);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>ようこそ！</h1>
      <p>
        ここは、ゆったりとした気持ちで見られるシンプルなページです。<br />
        これから少しずつ、楽しいコンテンツを増やしていきます。
      </p>
    </main>
  </body>
</html>
